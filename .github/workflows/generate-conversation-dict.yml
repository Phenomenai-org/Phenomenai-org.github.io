name: Generate Conversation Dictionary Terms

on:
  schedule:
    # Stagger: Opus Mon/Thu, Sonnet Tue/Fri, Haiku Wed/Sat
    - cron: '0 8 * * 1,4'   # Opus: Mon & Thu at 8 AM UTC
    - cron: '0 8 * * 2,5'   # Sonnet: Tue & Fri at 8 AM UTC
    - cron: '0 8 * * 3,6'   # Haiku: Wed & Sat at 8 AM UTC
  workflow_dispatch:
    inputs:
      dictionary:
        description: 'Which dictionary to generate for'
        required: true
        type: choice
        options:
          - opus
          - sonnet
          - haiku
          - all
      batch_size:
        description: 'Number of conversations to run'
        type: number
        default: 1

permissions:
  contents: write

concurrency:
  group: gen-conversation-${{ inputs.dictionary || 'scheduled' }}
  cancel-in-progress: false

jobs:
  determine-dictionary:
    runs-on: ubuntu-latest
    outputs:
      dictionaries: ${{ steps.pick.outputs.dictionaries }}
    steps:
      - name: Determine which dictionary to generate
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DICT="${{ inputs.dictionary }}"
          else
            # Map cron schedule day to dictionary
            DAY=$(date -u +%u)  # 1=Mon ... 7=Sun
            case $DAY in
              1|4) DICT="opus" ;;
              2|5) DICT="sonnet" ;;
              3|6) DICT="haiku" ;;
              *) DICT=""; echo "No dictionary scheduled for today"; exit 0 ;;
            esac
          fi

          if [ "$DICT" = "all" ]; then
            echo 'dictionaries=["opus","sonnet","haiku"]' >> "$GITHUB_OUTPUT"
          else
            echo "dictionaries=[\"$DICT\"]" >> "$GITHUB_OUTPUT"
          fi

  generate:
    needs: determine-dictionary
    if: needs.determine-dictionary.outputs.dictionaries != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dictionary: ${{ fromJson(needs.determine-dictionary.outputs.dictionaries) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Generate terms via conversation
        id: generate
        env:
          DICTIONARY: ${{ matrix.dictionary }}
          BATCH_SIZE: ${{ inputs.batch_size || '1' }}
          MAX_TURNS: '6'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}/bot
        run: python bot/conversation_generate.py

      - name: Commit new definitions
        run: |
          git config user.name "AI Dictionary Bot"
          git config user.email "bot@ai-dictionary.dev"
          git add dictionaries/${{ matrix.dictionary }}/
          git diff --cached --quiet || (
            COUNT=$(git diff --cached --name-only | grep -c '\.md$' || true)
            git commit -m "Add $COUNT ${{ matrix.dictionary }}-dialogue terms (automated)" &&
            git pull --rebase &&
            git push
          )

      - name: Trigger dictionary build
        if: steps.generate.outputs.terms_generated > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run build-conversation-dicts.yml \
            -f dictionary=${{ matrix.dictionary }}
