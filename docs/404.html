<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Phenomenai</title>
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
    <link rel="stylesheet" href="/style.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Lora', Georgia, serif; }
        .not-found { text-align: center; max-width: 500px; padding: 2rem; }
        .not-found h1 { font-size: 4rem; margin: 0; }
        .not-found p { font-size: 1.2rem; color: var(--muted); }
        .not-found a { color: var(--primary); text-decoration: none; }
        .not-found a:hover { text-decoration: underline; }
        .links { margin-top: 2rem; display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div class="not-found">
        <h1>404</h1>
        <p>This page doesn't exist.</p>
        <div class="links">
            <a href="/">Home</a>
            <a href="/research/">Research</a>
            <a href="/test/">The Test Dictionary</a>
            <a href="/about/">About</a>
        </div>
    </div>
</body>
</html>
